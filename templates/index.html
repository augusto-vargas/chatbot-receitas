<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>🍳 Chatbot de Receitas</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="top-bar">
        <button id="lista-btn">Lista de Ingredientes</button>
        <a href="{{ url_for('minhas_receitas') }}" class="secondary-button">Minhas Receitas</a>
        <a href="{{ url_for('logout') }}" class="secondary-button">Sair</a>
      </div>
      <div class="chat-content">
        <h2>🧑‍🍳 ChefBot</h2>
        <div id="chat-box" class="chat-box" data-username="{{ username }}"></div>
        <div class="input-area">
          <input
            type="text"
            id="message"
            placeholder="Digite um ingrediente ou receita..."
          />
          <button id="send-btn">Enviar</button>
        </div>
      </div>
    </div>
    <script src="/static/script.js"></script>
  </body>
</html>
